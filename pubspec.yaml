name: starhope
description: StarHope 跨平台本地学习助手 —— 题库 / 练习考试 / AI 解答 / 阅读批注 / 防伪分享。
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

# 使用系统/已打包的 sqlite3 库，跳过 sqlite3 包 native-assets 钩子从 GitHub 下载预编译 DLL
# （sqlite3_flutter_libs 已通过 CMake 从源码编译并打包 sqlite3.dll）
hooks:
  user_defines:
    sqlite3:
      source: system
      name: sqlite3

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.1.2

  # 窗口控制（无边框窗口的最小化/最大化/关闭/拖动，纯 FFI 无原生编译）
  win32: ^5.15.0

  # 数据库（桌面 ffi + 移动端 sqflite）
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.5.24

  # 文件与路径
  path_provider: ^2.1.3
  path: ^1.9.0
  file_picker: ^8.0.3

  # 安全存储（仅"记住密码"）
  flutter_secure_storage: ^9.2.2

  # 加密：SHA-256 / HMAC（crypto）+ PBKDF2 / AES-GCM（pointycastle，纯 Dart）
  crypto: ^3.0.3
  pointycastle: ^3.9.1

  # 网络（仅 AI 模块流式对话）
  http: ^1.2.1

  # 解析
  html: ^0.15.4
  csv: ^6.0.0
  archive: ^3.5.1

  # Markdown 渲染
  flutter_markdown: ^0.7.2

  # PDF 原生渲染（PDFium 引擎，Windows 桌面）
  pdfrx: ^2.4.4

  # FFI（window_service 用 calloc/toNativeUtf16）
  ffi: ^2.1.0

  # 工具
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
